spring.application.name=pipo-java

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pipo_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET:super-secret-key-change-me-to-at-least-32-characters}
jwt.expiration=259200000

server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

logging.level.com.scheduler=INFO
logging.level.org.springframework.security=WARN

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
