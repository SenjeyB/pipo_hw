apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipo-java-app
  namespace: pipo-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pipo-java-app
  template:
    metadata:
      labels:
        app: pipo-java-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: pipo-java
          image: pipo-java:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: pipo-config
            - secretRef:
                name: pipo-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pipo-java-service
  namespace: pipo-java
spec:
  selector:
    app: pipo-java-app
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: pipo-java-lb
  namespace: pipo-java
spec:
  selector:
    app: pipo-java-app
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
